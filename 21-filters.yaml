- name: filters
  hosts: local
  connection: local
  tasks:
  - name: Handle undefined variables
    ansible.builtin.debug:
      msg: "Hello  {{ person | default('Suresh')}}" # person is not defined so it will take default value mentioned as "Suresh".

  - name: Convert string to list
    vars:
      fruits: "apple, banana, orange, grapes"
    ansible.builtin.debug:
      msg: "fruits are {{ fruits | split(',') }}"

  - name: Convert map to list
    vars:
      course:
        name: ansible
        duration: 10hrs
        trainer: siva
    ansible.builtin.debug:
      msg: "Course info: {{ course | dict2items }}"

  - name: Convert list to map
    vars:
      course:
        - { 'key': 'name', 'value': 'ansible' }
        - { 'key': 'duration', 'value': '10hrs' }
        - { 'key': 'trainer', 'value': 'siva' }
    ansible.builtin.debug:
      msg: "Course info: {{ course | items2dict }}"

  - name: Convert upper case to lower case
    tags:
    - uppertolower # Tags are not mandatory
    vars:
      name: "Mahender Goute"
    ansible.builtin.debug:
      msg: "Hello {{ name | lower }}"

  - name: Convert Lower case to upper case
    vars:
      name: "mahender goute"
    ansible.builtin.debug:
      msg: "Hello {{ name | upper }}"
     
  - name: Print min and max number
    vars:
      numbers: [1,25,40,2256,33465]
    ansible.builtin.debug:
      msg: "Min is {{ numbers | min }}, Max is {{ numbers | max }}"

  - name: Check IP address is valid or not
    vars:
      ip: "192.168.20.5"
    ansible.builtin.debug:
      msg: "{{ ip | ansible.utils.ipaddr }}"
