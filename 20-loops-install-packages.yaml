- name: Install Packages
  hosts: web
  become: yes
  tasks:
  - name: Install multiple packages.
    ansible.builtin.package:
      name: "{{ item.name }}"
      state: "{{ item.state }}"
    loop:
    - { name: 'git', state: 'present' }
    - { name: 'mysql', state: 'present' }
    - { name: 'gcc', state: 'present' }
    - { name: 'zip', state: 'present' }